<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>おふくろ便 - 仕送りごはんプロトタイプ</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #f6f3ec;
    --card: #ffffff;
    --ink: #3a3226;
    --sub: #8a8072;
    --accent: #e8794a;
    --accent-soft: #fbe4d6;
    --green: #6aa84f;
    --line: #ece6da;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #root { max-width: 460px; margin: 0 auto; min-height: 100vh; background: var(--bg); }
  .app { padding-bottom: 84px; }

  /* header */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: var(--accent); color: #fff;
    padding: 14px 18px 12px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .logo { font-weight: 800; font-size: 19px; letter-spacing: .5px; }
  .logo small { font-weight: 400; opacity: .85; font-size: 11px; display:block; margin-top:1px;}
  .roleswitch { display: flex; background: rgba(255,255,255,.2); border-radius: 999px; padding: 3px; }
  .roleswitch button {
    border: 0; background: transparent; color: #fff; font-weight: 700;
    padding: 6px 14px; border-radius: 999px; cursor: pointer; font-size: 13px;
  }
  .roleswitch button.on { background: #fff; color: var(--accent); }

  .screen { padding: 16px; }
  .hello { font-size: 14px; color: var(--sub); }
  .hello b { color: var(--ink); font-size: 16px; }

  .card {
    background: var(--card); border-radius: 16px; padding: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05); margin-bottom: 14px;
    border: 1px solid var(--line);
  }
  .card h3 { font-size: 14px; margin-bottom: 12px; display:flex; align-items:center; gap:6px;}
  .card h3 .tag { margin-left:auto; font-size:11px; font-weight:600; color:var(--sub);}

  .balance { background: linear-gradient(135deg,#e8794a,#f0a06e); color:#fff; border:0;}
  .balance .label { font-size: 12px; opacity: .9; }
  .balance .amt { font-size: 34px; font-weight: 800; margin-top: 2px; }
  .balance .amt small { font-size: 15px; font-weight: 600; }
  .balance .row { display:flex; justify-content:space-between; align-items:flex-end; }
  .balance .note { font-size:11px; opacity:.85; }

  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    border: 0; border-radius: 12px; padding: 12px 16px;
    font-weight: 700; font-size: 14px; cursor: pointer; width: 100%;
    background: var(--accent); color: #fff;
  }
  .btn:active { transform: scale(.98); }
  .btn.ghost { background: var(--accent-soft); color: var(--accent); }
  .btn.mini { width:auto; padding: 8px 14px; font-size: 13px; border-radius: 10px; }
  .btn.green { background: var(--green); }
  .btn:disabled { opacity: .5; cursor: default; }

  .menu-item { display:flex; gap:12px; align-items:center; padding:10px 0; border-bottom:1px solid var(--line);}
  .menu-item:last-child { border-bottom:0; }
  .emoji-ico { width:46px; height:46px; border-radius:12px; background:var(--accent-soft); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0;}
  .menu-item .info { flex:1; }
  .menu-item .info .nm { font-weight: 700; font-size: 14px; }
  .menu-item .info .meta { font-size: 12px; color: var(--sub); margin-top:2px; }
  .pill { display:inline-block; font-size:11px; font-weight:700; padding:3px 8px; border-radius:999px; }
  .pill.wait { background:#fdeecb; color:#b8860b; }
  .pill.ship { background:#d9ecff; color:#2b6cb0; }
  .pill.done { background:#dff3d8; color:#40803a; }

  .ing-list { list-style:none; font-size:13px; color:var(--sub); margin-top:8px; }
  .ing-list li { display:flex; justify-content:space-between; padding:3px 0;}

  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12px; font-weight:700; color:var(--sub); margin-bottom:5px; }
  .field input, .field textarea, .field select {
    width:100%; border:1px solid var(--line); border-radius:10px; padding:11px; font-size:14px; font-family:inherit; background:#fdfcf9;
  }
  .field textarea { resize:vertical; min-height:60px; }

  .feed-post { display:flex; gap:12px; margin-bottom:14px; }
  .avatar { width:38px; height:38px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; font-weight:700;}
  .avatar.mom { background:#d98cae; }
  .avatar.kid { background:#6ea9d9; }
  .bubble { background:#fff; border:1px solid var(--line); border-radius:4px 14px 14px 14px; padding:10px 12px; flex:1;}
  .feed-post.me .bubble { background:var(--accent-soft); border-color:var(--accent-soft);}
  .bubble .who { font-size:12px; font-weight:700; margin-bottom:4px; }
  .bubble .who span { color:var(--sub); font-weight:400; margin-left:6px; font-size:11px;}
  .bubble .photo { width:100%; border-radius:10px; margin:6px 0; display:block; background:#f0ece2; aspect-ratio: 4/3; object-fit:cover;}
  .bubble .photo.ph { display:flex; align-items:center; justify-content:center; font-size:44px; }
  .bubble .txt { font-size:14px; line-height:1.5; }
  .reacts { display:flex; gap:6px; margin-top:8px; }
  .reacts button { border:1px solid var(--line); background:#fff; border-radius:999px; padding:3px 10px; font-size:12px; cursor:pointer; }
  .reacts button.on { background:var(--accent-soft); border-color:var(--accent); }

  .req-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line);}
  .req-item:last-child{border-bottom:0;}
  .req-item .info{flex:1;}
  .req-item .info .nm{font-weight:700;font-size:14px;}
  .req-item .info .meta{font-size:12px;color:var(--sub);}

  .empty { text-align:center; color:var(--sub); font-size:13px; padding:18px 0; }

  .tabbar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width:460px; background:#fff; border-top:1px solid var(--line);
    display:flex; z-index: 20; padding: 6px 0 max(6px, env(safe-area-inset-bottom));
  }
  .tabbar button {
    flex:1; border:0; background:transparent; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:10px; color:var(--sub); padding:5px 0; font-weight:600;
  }
  .tabbar button .ic { font-size:20px; }
  .tabbar button.on { color: var(--accent); }
  .badge { position:absolute; top:2px; margin-left:16px; background:var(--accent); color:#fff; font-size:9px; font-weight:800; border-radius:999px; padding:1px 5px;}

  .toast {
    position: fixed; bottom: 92px; left:50%; transform:translateX(-50%);
    background: var(--ink); color:#fff; padding:10px 18px; border-radius:999px;
    font-size:13px; font-weight:600; z-index:50; box-shadow:0 4px 14px rgba(0,0,0,.2);
    animation: pop .25s ease;
  }
  @keyframes pop { from{opacity:0; transform:translate(-50%,8px);} to{opacity:1;} }
  .section-title { font-size:13px; font-weight:800; color:var(--sub); margin:4px 2px 10px; letter-spacing:.5px;}

  .overlay { position:fixed; inset:0; background:rgba(40,32,22,.45); z-index:40; display:flex; align-items:flex-end; justify-content:center; animation:fade .2s ease;}
  @keyframes fade { from{opacity:0;} to{opacity:1;} }
  .sheet { width:100%; max-width:460px; background:var(--card); border-radius:22px 22px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom)); animation:slideup .25s ease;}
  @keyframes slideup { from{transform:translateY(30px);opacity:.6;} to{transform:translateY(0);opacity:1;} }
  .sheet h3 { font-size:16px; display:flex; align-items:center; gap:8px; margin-bottom:4px;}
  .sheet .sub { font-size:12px; color:var(--sub); margin-bottom:16px;}
  .daygrid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px;}
  .daybtn { border:1.5px solid var(--line); background:#fff; border-radius:12px; padding:12px 4px; cursor:pointer; text-align:center; font-family:inherit;}
  .daybtn .d1 { font-size:13px; font-weight:700; }
  .daybtn .d2 { font-size:11px; color:var(--sub); margin-top:2px;}
  .daybtn.on { border-color:var(--accent); background:var(--accent-soft); }
  .daybtn.on .d2 { color:var(--accent); }
  .hint { font-size:12px; color:var(--sub); background:#fff8f0; border:1px dashed var(--accent-soft); border-radius:10px; padding:9px 11px; margin-bottom:14px; line-height:1.5;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

// ---------- seed data ----------
const MOM = "お母さん";
const KID = "ゆうた";

const seedRecipes = [
  { id:"r1", name:"肉じゃが", emoji:"🥔", from:MOM,
    ingredients:[{n:"じゃがいも",q:"3個",p:180},{n:"牛こま切れ",q:"150g",p:320},{n:"玉ねぎ",q:"1個",p:80},{n:"にんじん",q:"1本",p:70}] },
  { id:"r2", name:"生姜焼き", emoji:"🍖", from:MOM,
    ingredients:[{n:"豚ロース",q:"200g",p:360},{n:"生姜",q:"1片",p:60},{n:"キャベツ",q:"1/4玉",p:90}] },
];

const seedFeed = [
  { id:"f1", author:KID, role:"student", dish:"肉じゃが", photo:"🍲", text:"初めて作った！ちょっと甘めになったけど美味しくできたよ🙌", reacts:{"❤️":1,"👏":1}, mine:{} },
  { id:"f2", author:MOM, role:"parent", dish:null, photo:null, text:"すごい！ちゃんと味しみてる？次は落し蓋してみてね😊", reacts:{}, mine:{} },
];

let uid = 100;
const nid = (p) => p + (uid++);

// 全角数字→半角に変換（IMEオン時の入力対策）
const toHalf = (s) => s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));

// 日付ユーティリティ
const WD = ["日","月","火","水","木","金","土"];
const addDays = (n) => { const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+n); return d; };
const fmtDate = (d) => `${d.getMonth()+1}/${d.getDate()}(${WD[d.getDay()]})`;
const toKey = (d) => `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
const keyToDate = (k) => { const [y,m,dd]=k.split("-").map(Number); return new Date(y,m-1,dd); };

// アプリ内の物価基準（1品あたりの目安価格・円）。食材名の部分一致で判定。
const PRICE_BOOK = {
  "じゃがいも":60,"玉ねぎ":50,"たまねぎ":50,"にんじん":40,"人参":40,"牛":300,"豚":250,"鶏":220,"ひき肉":230,
  "生姜":60,"しょうが":60,"にんにく":60,"キャベツ":180,"レタス":180,"トマト":120,"きゅうり":50,
  "なす":60,"ピーマン":50,"ほうれん草":150,"もやし":40,"ねぎ":90,"大根":130,"きのこ":150,"しめじ":120,
  "卵":30,"牛乳":220,"バター":300,"チーズ":250,"米":400,"パン":150,"豆腐":80,"納豆":100,
  "魚":300,"鮭":200,"さば":220,"えび":350,"ツナ":120,"ベーコン":200,"ソーセージ":250,"ハム":200,
  "小麦粉":150,"パン粉":120,"パスタ":150,"マカロニ":180,"うどん":120,"醤油":200,"味噌":300,
  "油":300,"砂糖":200,"塩":150,"みりん":250,"酒":300,"ケチャップ":200,"ソース":250,"マヨネーズ":200,
};
const COUNT_UNITS = ["個","本","玉","枚","パック","缶","束","片"];
function priceFor(name, amt, unit){
  let base = 150; // 基準（その他）
  for(const k in PRICE_BOOK){ if(name.includes(k)){ base = PRICE_BOOK[k]; break; } }
  const n = Number(amt);
  if(COUNT_UNITS.includes(unit) && n > 1) return base * n; // 数量分を反映
  return base;
}

// ---------- App ----------
function App(){
  const [role, setRole] = useState("student"); // student | parent
  const [tab, setTab] = useState("home");
  const [balance, setBalance] = useState(24000);
  const [recipes, setRecipes] = useState(seedRecipes);
  // orders: recipe queued -> auto ingredient order
  const [orders, setOrders] = useState([
    { id:"o1", recipeId:"r1", name:"肉じゃが", emoji:"🥔", total:650, status:"shipping" },
  ]);
  const [requests, setRequests] = useState([
    { id:"rq1", dish:"お母さんのグラタン", note:"寒くなってきたから食べたい…！", status:"open" },
  ]);
  const [feed, setFeed] = useState(seedFeed);
  const [toast, setToast] = useState(null);
  const [cookTarget, setCookTarget] = useState(null); // 作る日を選ぶ対象レシピ

  const openReqCount = requests.filter(r=>r.status==="open").length;

  function flash(msg){ setToast(msg); setTimeout(()=>setToast(null), 1900); }

  // 「作る」→ いつ作りたいか希望を聞く
  function askCook(rc){ setCookTarget(rc); }

  // 希望日を確定して自動発注
  function orderRecipe(rc, cookKey){
    const total = rc.ingredients.reduce((s,i)=>s+i.p,0);
    if(total > balance){ flash("残高が足りません💦 親に仕送りを頼もう"); setCookTarget(null); return; }
    setBalance(b=>b-total);
    setOrders(o=>[{ id:nid("o"), recipeId:rc.id, name:rc.name, emoji:rc.emoji, total, status:"preparing", cookAt:cookKey },...o]);
    const d = fmtDate(keyToDate(cookKey));
    flash(`${rc.name}の食材を${d}までにお届けします`);
    setCookTarget(null);
    setTab("orders");
  }

  function advanceOrder(id){
    setOrders(os=>os.map(o=>{
      if(o.id!==id) return o;
      const next = o.status==="preparing"?"shipping":o.status==="shipping"?"delivered":"delivered";
      return {...o, status:next};
    }));
  }

  // 親が仕送り
  function sendMoney(amt){
    setBalance(b=>b+amt);
    flash(`¥${amt.toLocaleString()} を仕送りしました`);
  }

  // 学生がリクエスト
  function addRequest(dish, note){
    setRequests(r=>[{id:nid("rq"), dish, note, status:"open"},...r]);
    flash("お母さんにリクエストを送りました📮");
    setTab("home");
  }

  // 親がレシピ登録（リクエストに応える形も可）
  function addRecipe(rc, fulfillReqId){
    setRecipes(rs=>[...rs, rc]);
    if(fulfillReqId){
      setRequests(rs=>rs.map(r=>r.id===fulfillReqId?{...r,status:"answered"}:r));
    }
    flash(`「${rc.name}」のレシピを登録しました🍳`);
    setTab("menu");
  }

  // フィード投稿
  function post(p){
    setFeed(f=>[...f, {id:nid("f"), reacts:{}, mine:{}, ...p}]);
    flash("投稿しました！");
    setTab("feed");
  }
  function react(fid, emo){
    setFeed(f=>f.map(p=>{
      if(p.id!==fid) return p;
      const mine = {...p.mine};
      const reacts = {...p.reacts};
      if(mine[emo]){ delete mine[emo]; reacts[emo]=(reacts[emo]||1)-1; if(reacts[emo]<=0) delete reacts[emo]; }
      else { mine[emo]=true; reacts[emo]=(reacts[emo]||0)+1; }
      return {...p, mine, reacts};
    }));
  }

  const ctx = { role, balance, recipes, orders, requests, feed,
    orderRecipe, askCook, advanceOrder, sendMoney, addRequest, addRecipe, post, react, flash, setTab };

  return (
    <div className="app">
      <div className="topbar">
        <div className="logo">おふくろ便<small>仕送りごはん プロトタイプ</small></div>
        <div className="roleswitch">
          <button className={role==="student"?"on":""} onClick={()=>{setRole("student");setTab("home");}}>学生</button>
          <button className={role==="parent"?"on":""} onClick={()=>{setRole("parent");setTab("home");}}>親</button>
        </div>
      </div>

      {role==="student"
        ? <StudentScreens tab={tab} ctx={ctx} />
        : <ParentScreens tab={tab} ctx={ctx} />}

      <TabBar role={role} tab={tab} setTab={setTab} reqBadge={openReqCount} />
      {cookTarget && <CookScheduler rc={cookTarget} onClose={()=>setCookTarget(null)} onConfirm={orderRecipe}/>}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ---------- Student ----------
function StudentScreens({tab, ctx}){
  if(tab==="home") return <StudentHome ctx={ctx}/>;
  if(tab==="orders") return <Orders ctx={ctx}/>;
  if(tab==="feed") return <Feed ctx={ctx}/>;
  if(tab==="menu") return <RecipeList ctx={ctx}/>;
  return null;
}

function StudentHome({ctx}){
  const [dish,setDish]=useState("");
  const [note,setNote]=useState("");
  const myReqs = ctx.requests;
  return (
    <div className="screen">
      <div className="hello">こんにちは、<b>{KID}</b>さん 👋</div>

      <div className="card balance">
        <div className="label">仕送り残高</div>
        <div className="row">
          <div className="amt"><small>¥</small>{ctx.balance.toLocaleString()}</div>
          <div className="note">食材代は残高から<br/>自動で引かれます</div>
        </div>
      </div>

      <div className="hint">💡 食材は自分で選ばなくてOK。親か自分が登録したレシピを「作る」と、必要な食材がまとめて自動発注されます。</div>

      <div className="card">
        <h3>🍳 今週つくれるメニュー <span className="tag">レシピ{ctx.recipes.length}件</span></h3>
        {ctx.recipes.map(rc=>(
          <div className="menu-item" key={rc.id}>
            <div className="emoji-ico">{rc.emoji}</div>
            <div className="info">
              <div className="nm">{rc.name}</div>
              <div className="meta">{rc.from}のレシピ・食材{rc.ingredients.length}品 / ¥{rc.ingredients.reduce((s,i)=>s+i.p,0).toLocaleString()}</div>
            </div>
            <button className="btn mini" onClick={()=>ctx.askCook(rc)}>作る</button>
          </div>
        ))}
      </div>

      <div className="card">
        <h3>💌 お母さんにリクエスト</h3>
        <div className="field">
          <label>食べたい料理</label>
          <input value={dish} onChange={e=>setDish(e.target.value)} placeholder="例）お母さんのグラタン"/>
        </div>
        <div className="field">
          <label>ひとこと（任意）</label>
          <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="寒くなってきたから食べたいな…"/>
        </div>
        <button className="btn" disabled={!dish.trim()} onClick={()=>{ctx.addRequest(dish.trim(),note.trim()); setDish("");setNote("");}}>リクエストを送る</button>

        {myReqs.length>0 && <>
          <div className="section-title" style={{marginTop:16}}>送ったリクエスト</div>
          {myReqs.map(r=>(
            <div className="req-item" key={r.id}>
              <div className="emoji-ico">🍽️</div>
              <div className="info"><div className="nm">{r.dish}</div><div className="meta">{r.note||"—"}</div></div>
              <span className={"pill "+(r.status==="answered"?"done":"wait")}>{r.status==="answered"?"レシピ登録済":"返信待ち"}</span>
            </div>
          ))}
        </>}
      </div>
    </div>
  );
}

// ---------- Parent ----------
function ParentScreens({tab, ctx}){
  if(tab==="home") return <ParentHome ctx={ctx}/>;
  if(tab==="orders") return <Orders ctx={ctx}/>;
  if(tab==="feed") return <Feed ctx={ctx}/>;
  if(tab==="menu") return <RecipeList ctx={ctx}/>;
  return null;
}

function ParentHome({ctx}){
  return (
    <div className="screen">
      <div className="hello"><b>{MOM}</b>のホーム 🏠</div>

      <SendMoney ctx={ctx}/>

      <div className="card">
        <h3>💌 {KID}からのリクエスト</h3>
        {ctx.requests.filter(r=>r.status==="open").length===0 && <div className="empty">今は新しいリクエストはありません</div>}
        {ctx.requests.filter(r=>r.status==="open").map(r=>(
          <RequestRow key={r.id} req={r} ctx={ctx}/>
        ))}
      </div>

      <RecipeForm ctx={ctx}/>
    </div>
  );
}

function SendMoney({ctx}){
  const [amt,setAmt]=useState("");
  const [pending,setPending]=useState(null); // 確認中の金額

  function ask(v){
    const n = Number(v);
    if(!n || n<=0) return;
    setPending(n);
  }
  function confirmSend(){
    ctx.sendMoney(pending);
    setPending(null);
    setAmt("");
  }

  if(pending!==null){
    return (
      <div className="card">
        <h3>💴 仕送りの確認</h3>
        <div style={{textAlign:"center",padding:"6px 0 14px"}}>
          <div style={{fontSize:13,color:"var(--sub)"}}>{KID}さんに仕送りします</div>
          <div style={{fontSize:32,fontWeight:800,margin:"6px 0"}}>¥{pending.toLocaleString()}</div>
          <div style={{fontSize:12,color:"var(--sub)"}}>送金後の残高 ¥{(ctx.balance+pending).toLocaleString()}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn ghost" onClick={()=>setPending(null)}>キャンセル</button>
          <button className="btn" onClick={confirmSend}>この金額で送る</button>
        </div>
      </div>
    );
  }

  return (
    <div className="card">
      <h3>💴 仕送りを送る <span className="tag">{KID}の残高 ¥{ctx.balance.toLocaleString()}</span></h3>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[5000,10000,20000].map(a=>(
          <button key={a} className="btn ghost mini" style={{flex:1}} onClick={()=>ask(a)}>¥{a.toLocaleString()}</button>
        ))}
      </div>
      <div className="field" style={{marginBottom:10}}>
        <label>金額を入力</label>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:20,fontWeight:700}}>¥</span>
          <input style={{flex:1}} type="number" min="0" step="1000" inputMode="numeric" placeholder="例）15000" value={amt}
            onChange={e=>setAmt(toHalf(e.target.value).replace(/[^0-9]/g,""))}/>
        </div>
      </div>
      <button className="btn" disabled={!amt || Number(amt)<=0} onClick={()=>ask(amt)}>金額を確認して送る</button>
    </div>
  );
}

function RequestRow({req, ctx}){
  const [open,setOpen]=useState(false);
  return (
    <div>
      <div className="req-item">
        <div className="emoji-ico">🍽️</div>
        <div className="info"><div className="nm">{req.dish}</div><div className="meta">{req.note||"—"}</div></div>
        <button className="btn mini" onClick={()=>setOpen(o=>!o)}>{open?"閉じる":"応える"}</button>
      </div>
      {open && <RecipeForm ctx={ctx} preset={req.dish} fulfill={req.id} inline/>}
    </div>
  );
}

const UNITS = ["個","g","kg","ml","L","本","玉","枚","束","パック","缶","片","適量"];

function RecipeForm({ctx, preset="", fulfill=null, inline=false}){
  const [name,setName]=useState(preset);
  const [emoji,setEmoji]=useState("🍳");
  const [rows,setRows]=useState([{n:"",amt:"",unit:"個",p:""},{n:"",amt:"",unit:"個",p:""}]);
  const [confirm,setConfirm]=useState(null); // 確認中のレシピ

  function setRow(i,k,v){ setRows(rs=>rs.map((r,idx)=>idx===i?{...r,[k]:v}:r)); }
  function addRow(){ setRows(rs=>[...rs,{n:"",amt:"",unit:"個",p:""}]); }

  function makeQ(r){
    if(r.unit==="適量") return "適量";
    if(!r.amt.trim()) return "適量";
    return r.amt.trim()+r.unit;
  }

  // 内容を検証して確認画面へ
  function review(){
    if(!name.trim()){ ctx.flash("料理名を入力してください"); return; }
    const ings = rows.filter(r=>r.n.trim()).map(r=>({n:r.n.trim(), q:makeQ(r), p:priceFor(r.n.trim(), r.amt, r.unit)}));
    if(ings.length===0){ ctx.flash("食材は１つ以上登録する必要があります"); return; }
    setConfirm({ id:nid("r"), name:name.trim(), emoji, from:MOM, ingredients:ings });
  }

  // 確認後に本登録
  function doRegister(){
    ctx.addRecipe(confirm, fulfill);
    setConfirm(null);
  }

  const body = (
    <>
      <div className="field">
        <label>料理名</label>
        <div style={{display:"flex",gap:8}}>
          <input style={{width:64,textAlign:"center",fontSize:22}} value={emoji} onChange={e=>setEmoji(e.target.value.slice(0,2))}/>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="例）グラタン"/>
        </div>
      </div>
      <label style={{display:"block",fontSize:12,fontWeight:700,color:"var(--sub)",marginBottom:5}}>必要な食材（金額はアプリの物価基準で自動計算）</label>
      {rows.map((r,i)=>(
        <div key={i} style={{display:"flex",gap:6,marginBottom:6}}>
          <input style={{flex:3,minWidth:0}} placeholder="食材" value={r.n} onChange={e=>setRow(i,"n",e.target.value)}/>
          <input style={{width:52}} placeholder="量" inputMode="numeric" disabled={r.unit==="適量"} value={r.amt} onChange={e=>setRow(i,"amt",e.target.value)}/>
          <select style={{width:76,padding:"11px 4px"}} value={r.unit} onChange={e=>setRow(i,"unit",e.target.value)}>
            {UNITS.map(u=>(<option key={u} value={u}>{u}</option>))}
          </select>
        </div>
      ))}
      <button className="btn ghost mini" style={{marginBottom:12}} onClick={addRow}>＋ 食材を追加</button>
      <button className="btn" onClick={review}>
        {fulfill?"このレシピで応える":"レシピを登録"}
      </button>
    </>
  );

  const confirmPanel = confirm && (
    <>
      <div style={{textAlign:"center",padding:"2px 0 12px"}}>
        <div style={{fontSize:40}}>{confirm.emoji}</div>
        <div style={{fontWeight:800,fontSize:18}}>{confirm.name}</div>
        <div style={{fontSize:12,color:"var(--sub)",marginTop:2}}>この内容で登録しますか？</div>
      </div>
      <ul className="ing-list">
        {confirm.ingredients.map((i,idx)=>(<li key={idx}><span>・{i.n}（{i.q}）</span><span>¥{i.p}</span></li>))}
        <li style={{borderTop:"1px solid var(--line)",marginTop:4,paddingTop:6,fontWeight:700,color:"var(--ink)"}}>
          <span>食材代 合計</span><span>¥{confirm.ingredients.reduce((s,i)=>s+i.p,0).toLocaleString()}</span>
        </li>
      </ul>
      <div style={{display:"flex",gap:8,marginTop:14}}>
        <button className="btn ghost" onClick={()=>setConfirm(null)}>修正する</button>
        <button className="btn" onClick={doRegister}>この内容で登録</button>
      </div>
    </>
  );

  const content = confirm ? confirmPanel : body;
  if(inline) return <div style={{padding:"6px 0 12px"}}>{content}</div>;
  return <div className="card"><h3>🍳 {confirm?"レシピの確認":"レシピを登録して食材を届ける"}</h3>{content}</div>;
}

// ---------- Shared: Orders ----------
function Orders({ctx}){
  const statusMap = {
    preparing:{cls:"wait", label:"準備中", ic:"📦"},
    shipping:{cls:"ship", label:"配達中", ic:"🚚"},
    delivered:{cls:"done", label:"お届け済", ic:"✅"},
  };
  return (
    <div className="screen">
      <div className="section-title">スーパーからの食材配達</div>
      <div className="hint">🏪 生活圏のスーパーが、レシピに必要な食材だけをまとめて配達します。</div>
      {ctx.orders.length===0 && <div className="empty">まだ注文はありません</div>}
      {ctx.orders.map(o=>{
        const rc = ctx.recipes.find(r=>r.id===o.recipeId);
        const s = statusMap[o.status];
        return (
          <div className="card" key={o.id}>
            <div className="menu-item" style={{borderBottom:0,paddingTop:0}}>
              <div className="emoji-ico">{o.emoji}</div>
              <div className="info">
                <div className="nm">{o.name}の食材セット</div>
                <div className="meta">合計 ¥{o.total.toLocaleString()}{o.cookAt && ` ・ ${fmtDate(keyToDate(o.cookAt))}に作る予定`}</div>
              </div>
              <span className={"pill "+s.cls}>{s.ic} {s.label}</span>
            </div>
            {rc && <ul className="ing-list">
              {rc.ingredients.map((i,idx)=>(<li key={idx}><span>・{i.n}（{i.q}）</span><span>¥{i.p}</span></li>))}
            </ul>}
            {o.status!=="delivered" && ctx.role==="student" &&
              <button className="btn green mini" style={{marginTop:10}} onClick={()=>ctx.advanceOrder(o.id)}>
                {o.status==="preparing"?"配達を開始（デモ）":"受け取る"}
              </button>}
          </div>
        );
      })}
    </div>
  );
}

// ---------- Shared: Feed ----------
function Feed({ctx}){
  const [text,setText]=useState("");
  const [photo,setPhoto]=useState(null);
  const [dish,setDish]=useState("");
  const isStudent = ctx.role==="student";

  function onFile(e){
    const f=e.target.files[0]; if(!f) return;
    setPhoto(URL.createObjectURL(f));
  }
  function submit(){
    if(!text.trim() && !photo) return;
    ctx.post({ author:isStudent?KID:MOM, role:ctx.role, dish:dish.trim()||null, photo, text:text.trim() });
    setText(""); setPhoto(null); setDish("");
  }

  return (
    <div className="screen">
      <div className="section-title">おうちごはん トーク</div>

      <div className="card">
        {isStudent && <div className="field">
          <label>作った料理（任意）</label>
          <input value={dish} onChange={e=>setDish(e.target.value)} placeholder="例）肉じゃが"/>
        </div>}
        <div className="field">
          <label>メッセージ</label>
          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={isStudent?"作ったよ！写真送るね📸":"お疲れさま！"}/>
        </div>
        {isStudent && <label className="btn ghost" style={{marginBottom:10, cursor:"pointer"}}>
          {photo?"📷 写真を変更":"📷 料理の写真を追加"}
          <input type="file" accept="image/*" style={{display:"none"}} onChange={onFile}/>
        </label>}
        {photo && <img src={photo} className="bubble" style={{width:"100%",borderRadius:12,marginBottom:10}}/>}
        <button className="btn" disabled={!text.trim() && !photo} onClick={submit}>送信</button>
      </div>

      {ctx.feed.map(p=>{
        const mine = p.author===(isStudent?KID:MOM);
        return (
          <div className={"feed-post"+(mine?" me":"")} key={p.id}>
            {!mine && <div className={"avatar "+(p.role==="parent"?"mom":"kid")}>{p.author[0]}</div>}
            <div className="bubble">
              <div className="who">{p.author}{p.dish && <span>🍽 {p.dish}を作りました</span>}</div>
              {p.photo && (p.photo.startsWith("blob")||p.photo.startsWith("http")
                ? <img src={p.photo} className="photo"/>
                : <div className="photo ph">{p.photo}</div>)}
              {p.text && <div className="txt">{p.text}</div>}
              <div className="reacts">
                {["❤️","👏","😋"].map(e=>(
                  <button key={e} className={p.mine[e]?"on":""} onClick={()=>ctx.react(p.id,e)}>
                    {e} {p.reacts[e]||0}
                  </button>
                ))}
              </div>
            </div>
            {mine && <div className={"avatar "+(isStudent?"kid":"mom")}>{p.author[0]}</div>}
          </div>
        );
      })}
    </div>
  );
}

// ---------- Shared: Recipe list ----------
function RecipeList({ctx}){
  return (
    <div className="screen">
      <div className="section-title">登録レシピ一覧</div>
      <div className="hint">📖 ここにあるレシピから「作る」と、食材が自動でまとめて発注されます。</div>
      {ctx.recipes.map(rc=>(
        <div className="card" key={rc.id}>
          <div className="menu-item" style={{borderBottom:0,paddingTop:0}}>
            <div className="emoji-ico">{rc.emoji}</div>
            <div className="info">
              <div className="nm">{rc.name}</div>
              <div className="meta">{rc.from}のレシピ / ¥{rc.ingredients.reduce((s,i)=>s+i.p,0).toLocaleString()}</div>
            </div>
            {ctx.role==="student" && <button className="btn mini" onClick={()=>ctx.askCook(rc)}>作る</button>}
          </div>
          <ul className="ing-list">
            {rc.ingredients.map((i,idx)=>(<li key={idx}><span>・{i.n}（{i.q}）</span><span>¥{i.p}</span></li>))}
          </ul>
        </div>
      ))}
    </div>
  );
}

// ---------- CookScheduler (いつ作る？) ----------
function CookScheduler({rc, onClose, onConfirm}){
  const presets = [
    {key:toKey(addDays(0)), label:"今日", d:addDays(0)},
    {key:toKey(addDays(1)), label:"明日", d:addDays(1)},
    {key:toKey(addDays(2)), label:"あさって", d:addDays(2)},
  ];
  const [sel, setSel] = useState(presets[1].key); // 初期＝明日
  const [custom, setCustom] = useState("");
  const total = rc.ingredients.reduce((s,i)=>s+i.p,0);
  const chosen = custom || sel;

  function pickCustom(v){
    if(!v){ setCustom(""); return; }
    const [y,m,d] = v.split("-").map(Number);
    setCustom(`${y}-${m}-${d}`);
    setSel("");
  }

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <h3>{rc.emoji} {rc.name}をいつ作る？</h3>
        <div className="sub">選んだ日までに食材をお届けします（食材代 ¥{total.toLocaleString()}）</div>
        <div className="daygrid">
          {presets.map(p=>(
            <button key={p.key} className={"daybtn"+(sel===p.key?" on":"")}
              onClick={()=>{setSel(p.key);setCustom("");}}>
              <div className="d1">{p.label}</div>
              <div className="d2">{fmtDate(p.d)}</div>
            </button>
          ))}
        </div>
        <div className="field">
          <label>日付を指定</label>
          <input type="date" min={toKeyInput(addDays(0))} value={toKeyInput(keyToDate(chosen))}
            onChange={e=>pickCustom(e.target.value)}/>
        </div>
        <button className="btn" onClick={()=>onConfirm(rc, chosen)}>
          {fmtDate(keyToDate(chosen))}に作る・食材を発注
        </button>
      </div>
    </div>
  );
}
const toKeyInput = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

// ---------- TabBar ----------
function TabBar({role, tab, setTab, reqBadge}){
  const tabs = [
    {k:"home", ic:"🏠", label:"ホーム"},
    {k:"menu", ic:"📖", label:"レシピ"},
    {k:"orders", ic:"🛒", label:"配達"},
    {k:"feed", ic:"💬", label:"トーク"},
  ];
  return (
    <div className="tabbar">
      {tabs.map(t=>(
        <button key={t.k} className={tab===t.k?"on":""} onClick={()=>setTab(t.k)}>
          <span className="ic">{t.ic}</span>
          {t.label}
          {t.k==="home" && role==="parent" && reqBadge>0 && <span className="badge">{reqBadge}</span>}
        </button>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
